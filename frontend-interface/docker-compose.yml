volumes:
  tir_na_ai_data:

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: sovereign-ui
    restart: unless-stopped
    ports:
      # Bind strictly to Tailscale IP only - populated from .env by bootstrap.sh
      - "${TAILSCALE_IP}:3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://host.docker.internal:8080/v1
      # Reads the cryptographically generated key from .env - never hardcoded
      - OPENAI_API_KEY=${API_KEY}
      - WEBUI_NAME=Tír-na-AI
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui:

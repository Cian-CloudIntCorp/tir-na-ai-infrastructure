services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: sovereign-ui
    user: "0:0"
    network_mode: "bridge"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_BASE_URL=http://host.docker.internal:8080/v1
      - OPENAI_API_KEY=tir-na-ai-key
      - WEBUI_NAME=Tír-na-AI
    volumes:
      - tir_na_ai_data:/app/backend/data
    ports:
      # STRICT BIND: Dynamically grabs the Tailscale IP from the hidden .env file
      - "${TAILSCALE_IP}:3000:8080"
    restart: unless-stopped

volumes:
  tir_na_ai_data:

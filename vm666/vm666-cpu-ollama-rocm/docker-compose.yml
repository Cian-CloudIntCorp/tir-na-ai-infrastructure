services:
  ollama:
    # This docker compose is for CPU only hardware APIs compute, in the developers case it was: AVX-512
    image: ollama/ollama:latest
    container_name: bare-ai-engine
    # Resource limiting enforced here to match Proxmox Hard Fence
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    # --- CRITICAL ADDITIONS FOR HUGEPAGES ---
    cap_add:
      - IPC_LOCK  # Allows the container to lock memory
    ulimits:
      memlock:
        soft: -1  # Set to unlimited
        hard: -1
    volumes:
      - ollama_data:/root/.ollama
      - "/dev/hugepages:/dev/hugepages" # Mount the 1GB hugepage blocks
    # ----------------------------------------
    environment:
      # NOTE: Left in for documentation purposes
      - HSA_OVERRIDE_GFX_VERSION=11.0.2
    restart: unless-stopped
    # AIR-GAPPED: No public ports exposed intentionally

  open-terminal:
    image: ghcr.io/open-webui/open-terminal:main
    container_name: open-terminal
    restart: unless-stopped
    environment:
      - API_KEY=tir_na_ai_secret_key # User should change this
    volumes:
      - open_terminal_data:/home/user
    # No ports exposed: Keeps the terminal air-gapped from local/VPN network

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: bare-ai-webui
    depends_on:
      - ollama
      - open-terminal
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      # This tells the UI how to talk to the air-gapped engine inside Docker
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=True
      - WEBUI_NAME="Tír-na-AI (CPU Node)"
    ports:
      # STRICT BIND 1: Local Network Only
      - "192.168.86.204:3000:8080"
      # STRICT BIND 2: Headscale Network Only
      - "100.64.0.6:3000:8080"
    restart: unless-stopped

volumes:
  ollama_data:
  open_webui_data:
  open_terminal_data:
